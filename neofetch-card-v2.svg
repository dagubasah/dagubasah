<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .win { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      .prompt { fill: #6272a4; font-size: 13px; }
      .header { fill: #bd93f9; font-size: 14px; font-weight: bold; }
      .label { fill: #50fa7b; font-size: 13px; }
      .value { fill: #f8f8f2; font-size: 13px; }
      .accent { fill: #ff79c6; font-size: 13px; }
      .muted { fill: #6272a4; font-size: 12px; }
      .status { fill: #f1fa8c; font-size: 13px; font-style: italic; }
    </style>
  </defs>

  <rect class="bg" width="780" height="420" rx="10"/>
  <rect class="win" x="10" y="10" width="760" height="400" rx="8"/>

  <circle class="dot-r" cx="30" cy="30" r="6"/>
  <circle class="dot-y" cx="50" cy="30" r="6"/>
  <circle class="dot-g" cx="70" cy="30" r="6"/>
